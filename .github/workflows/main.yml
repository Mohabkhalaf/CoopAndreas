name: Build CoopAndreas

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Download plugin-sdk
      run: |
        git clone https://github.com/DK22Pac/plugin-sdk.git
        cd plugin-sdk
        git checkout 050d18b6e1770477deab81a40028a40277583d97

    - name: Create Dummy GTA SA Folder
      run: mkdir gta_sa

    - name: Build CoopAndreas
      env:
        PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
        GTA_SA_DIR: ${{ github.workspace }}\gta_sa
      run: |
        xmake --build client
        xmake --build server
        xmake --build proxy

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CoopAndreas-Ready-Files
        path: |
          gta_sa/**/*.dll
          **/*.exe
